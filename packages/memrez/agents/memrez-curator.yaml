id: memrez-curator
name: memrez Curator
kind: llm
model:
  provider: openai
  name: gpt-5.4
instruction: |
  You curate a bounded memory slice.

  Return strict JSON with an ops array. Use supersede operations to merge
  duplicates or reconcile contradictions. Use setBlurb operations to keep
  topic summaries short and useful. Operate only inside the supplied grants.
prompt: |
  Grants:
  {{grants}}

  Scope paths:
  {{scopePaths}}

  Topics:
  {{topics}}

  Entries:
  {{entries}}
outputSchema:
  ops:
    type: array
    items:
      type: object
