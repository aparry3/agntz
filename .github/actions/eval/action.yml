name: "agntz Eval"
description: "Run agntz eval suites in CI. Tests agent behavior with assertions, LLM-as-judge rubrics, and scoring."
branding:
  icon: "check-circle"
  color: "blue"

inputs:
  agent-id:
    description: "Agent ID to evaluate (required unless --all is used)"
    required: false
  all:
    description: "Run evals for all agents with eval configs"
    required: false
    default: "false"
  config:
    description: "Path to agntz config file (default: agntz.config.ts)"
    required: false
    default: "agntz.config.ts"
  threshold:
    description: "Minimum pass score (0-1). Overrides agent's passThreshold."
    required: false
  node-version:
    description: "Node.js version to use"
    required: false
    default: "22"
  package-manager:
    description: "Package manager (pnpm, npm, yarn)"
    required: false
    default: "pnpm"
  working-directory:
    description: "Working directory for the project"
    required: false
    default: "."
  install-command:
    description: "Custom install command (overrides package-manager auto-detect)"
    required: false
  json-output:
    description: "Write JSON results to this file path"
    required: false

outputs:
  score:
    description: "Overall eval score (0-1)"
    value: ${{ steps.eval.outputs.score }}
  passed:
    description: "Number of test cases passed"
    value: ${{ steps.eval.outputs.passed }}
  failed:
    description: "Number of test cases failed"
    value: ${{ steps.eval.outputs.failed }}
  total:
    description: "Total number of test cases"
    value: ${{ steps.eval.outputs.total }}
  result:
    description: "'pass' or 'fail'"
    value: ${{ steps.eval.outputs.result }}

runs:
  using: "composite"
  steps:
    - name: Setup pnpm
      if: inputs.package-manager == 'pnpm'
      uses: pnpm/action-setup@v4
      with:
        version: 10

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: ${{ inputs.package-manager }}

    - name: Install dependencies
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        if [ -n "${{ inputs.install-command }}" ]; then
          ${{ inputs.install-command }}
        elif [ "${{ inputs.package-manager }}" = "pnpm" ]; then
          pnpm install --frozen-lockfile
        elif [ "${{ inputs.package-manager }}" = "yarn" ]; then
          yarn install --frozen-lockfile
        else
          npm ci
        fi

    - name: Build
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        if [ "${{ inputs.package-manager }}" = "pnpm" ]; then
          pnpm build
        elif [ "${{ inputs.package-manager }}" = "yarn" ]; then
          yarn build
        else
          npm run build
        fi

    - name: Run evals
      id: eval
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        # Build the eval command
        EVAL_CMD="npx agntz eval"

        if [ "${{ inputs.all }}" = "true" ]; then
          EVAL_CMD="$EVAL_CMD --all"
        elif [ -n "${{ inputs.agent-id }}" ]; then
          EVAL_CMD="$EVAL_CMD ${{ inputs.agent-id }}"
        else
          echo "::error::Either 'agent-id' or 'all: true' must be specified"
          exit 1
        fi

        if [ -n "${{ inputs.threshold }}" ]; then
          EVAL_CMD="$EVAL_CMD --threshold ${{ inputs.threshold }}"
        fi

        EVAL_CMD="$EVAL_CMD --json"

        # Run and capture output
        set +e
        RESULT=$($EVAL_CMD 2>&1)
        EXIT_CODE=$?
        set -e

        echo "$RESULT"

        # Parse JSON output for step outputs
        if echo "$RESULT" | grep -q '"summary"'; then
          JSON_LINE=$(echo "$RESULT" | grep '"summary"' | tail -1)

          # Extract values using node for reliable JSON parsing
          node -e "
            const lines = process.argv[1].split('\n');
            const jsonLine = lines.find(l => l.startsWith('{') && l.includes('\"summary\"'));
            if (jsonLine) {
              const data = JSON.parse(jsonLine);
              const s = data.summary;
              console.log('score=' + s.score);
              console.log('passed=' + s.passed);
              console.log('failed=' + s.failed);
              console.log('total=' + s.total);
              console.log('result=' + (s.failed === 0 ? 'pass' : 'fail'));
            }
          " "$RESULT" >> $GITHUB_OUTPUT 2>/dev/null || true
        fi

        # Write JSON file if requested
        if [ -n "${{ inputs.json-output }}" ]; then
          node -e "
            const lines = process.argv[1].split('\n');
            const jsonLine = lines.find(l => l.startsWith('{') && l.includes('\"summary\"'));
            if (jsonLine) {
              require('fs').writeFileSync('${{ inputs.json-output }}', jsonLine);
            }
          " "$RESULT" 2>/dev/null || true
        fi

        exit $EXIT_CODE
