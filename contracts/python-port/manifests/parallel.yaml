id: review-pack
kind: parallel
description: Reviews an input with two independent agents.
inputSchema:
  userQuery: string
steps:
  - id: support
    agent: support
    input:
      userQuery: "{{userQuery}}"
  - id: tone
    agent:
      id: tone-reviewer
      kind: llm
      model:
        provider: anthropic
        name: claude-sonnet-4.5
      instruction: Check the tone of the answer.
      prompt: "{{userQuery}}"
    input:
      userQuery: "{{userQuery}}"
output:
  support: "{{support.answer}}"
  tone: "{{tone}}"
